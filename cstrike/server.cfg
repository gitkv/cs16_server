// Use this file to configure your DEDICATED server.
// This config file is executed on server start.

// disable autoaim
sv_aim 0

// disable clients' ability to pause the server
pausable 0

// default server name. Change to "Bob's Server", etc.
hostname "QR-Strike 1.6 Server"

// RCON password
rcon_password "password"

// default map
map cs_delta_assault

// maximum client movement speed
sv_maxspeed 320

// 20 minute timelimit
mp_timelimit 20

// disable cheats
sv_cheats 0

sv_minrate 100000
sv_minupdaterate 30
sv_maxupdaterate 101

sv_timeout 22
sv_lan 0

mp_freezetime 0
mp_friendlyfire 1
mp_falldamage 1
mp_winlimit 7
mp_forcechasecam 1
mp_flashlight 1
mp_playerid 0
mp_buytime 0

// load ban files
exec listip.cfg
exec banned.cfg
